<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Hack Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #020617; color: white; user-select: text !important; }</style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
            <h1 class="text-3xl font-black text-cyan-400">ADMIN <span class="text-white text-sm font-light">v2.0 Realtime</span></h1>
            <div class="flex gap-4">
                <div class="bg-slate-900 px-5 py-2 rounded-xl text-center"><p class="text-[10px] text-gray-500">USERS</p><h2 id="total_users" class="font-bold">0</h2></div>
                <div class="bg-slate-900 px-5 py-2 rounded-xl text-center"><p class="text-[10px] text-gray-500">PENDING</p><h2 id="total_req" class="text-orange-500 font-bold">0</h2></div>
            </div>
        </header>

        <div class="bg-slate-900 p-6 rounded-3xl mb-10 border border-white/5">
            <h3 class="font-bold mb-4 text-sm uppercase text-gray-400 tracking-widest">Quick Approve</h3>
            <div class="flex gap-2">
                <input type="text" id="manual_id" placeholder="Paste User UID here..." class="bg-black/40 p-4 rounded-2xl flex-1 outline-none border border-white/5">
                <button onclick="approve(document.getElementById('manual_id').value, 'VIP Manual')" class="bg-cyan-600 px-8 rounded-2xl font-black uppercase text-xs">Approve ID</button>
            </div>
        </div>

        <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><span>📥</span> Incoming Requests</h3>
        <div id="req_list" class="space-y-4">
            <div class="animate-pulse bg-slate-900 h-20 rounded-2xl"></div>
        </div>
    </div>

    <script>
        const dbURL = "https://ff-esport-bd-9dbc0-default-rtdb.firebaseio.com";

        function loadData() {
            fetch(`${dbURL}/requests.json`).then(res => res.json()).then(data => {
                const list = document.getElementById('req_list');
                list.innerHTML = "";
                if(!data) { 
                    list.innerHTML = "<p class='text-center text-gray-600 py-10'>No pending requests found.</p>";
                    document.getElementById('total_req').innerText = 0; 
                    return; 
                }
                
                let count = 0;
                Object.keys(data).reverse().forEach(key => {
                    const r = data[key];
                    count++;
                    list.innerHTML += `
                        <div class="bg-slate-900 p-6 rounded-3xl flex justify-between items-center border border-white/5 hover:border-cyan-500/30 transition-all">
                            <div>
                                <p class="font-black text-lg">${r.u_name} <span class="text-xs font-normal text-gray-500">(@${r.u_username})</span></p>
                                <p class="text-xs font-mono text-cyan-400 mb-2">ID: ${r.u_id}</p>
                                <div class="flex gap-3">
                                    <span class="bg-orange-500/10 text-orange-500 text-[10px] px-2 py-1 rounded font-bold">${r.plan}</span>
                                    <span class="bg-green-500/10 text-green-500 text-[10px] px-2 py-1 rounded font-bold">TRX: ${r.trx}</span>
                                </div>
                            </div>
                            <button onclick="approve('${r.u_id}', '${r.plan}', '${key}')" class="bg-white text-black px-6 py-3 rounded-2xl font-black text-[10px] uppercase hover:bg-cyan-400 transition-colors">Approve</button>
                        </div>
                    `;
                });
                document.getElementById('total_req').innerText = count;
            });

            fetch(`${dbURL}/users.json`).then(res => res.json()).then(data => {
                document.getElementById('total_users').innerText = data ? Object.keys(data).length : 0;
            });
        }

        function approve(uid, plan, key) {
            if(!uid) return alert("UID missing!");
            
            // Critical Update: Set isPaid explicitly to true
            fetch(`${dbURL}/users/${uid}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ 
                    isPaid: true, 
                    plan: plan, 
                    activeDate: new Date().toLocaleString() 
                })
            }).then(() => {
                if(key) fetch(`${dbURL}/requests/${key}.json`, { method: 'DELETE' });
                alert("Approved! User is now Premium.");
                loadData();
            }).catch(e => alert("Error approving user"));
        }

        setInterval(loadData, 4000);
        loadData();
    </script>
</body>
</html>
